<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çipil - Canlı Şikayet Havuzu</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --text: #f8fafc; --border: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 30px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 700px; }
        h2 { margin-bottom: 25px; border-left: 4px solid var(--accent); padding-left: 10px; font-size: 1.6rem; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 10px; margin-bottom: 15px; animation: gelmeEfekti 0.5s ease; }
        .header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; font-weight: bold; }
        .user-name { color: #f59e0b; }
        .cate { color: #3b82f6; background: rgba(59, 130, 246, 0.1); padding: 2px 8px; border-radius: 4px; }
        .text { line-height: 1.5; color: #cbd5e1; }
        .preview { max-width: 100%; max-height: 300px; border-radius: 6px; display: block; margin-top: 10px; border: 1px solid var(--border); }
        .status { background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; border: 1px solid var(--border); }
        @keyframes gelmeEfekti { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="status" id="srvStatus">Canlı hat başlatılıyor...</div>
    <h2>Canlı Gelen Kutusu (Site 2)</h2>
    <div id="list"></div>
</div>

<script>
    // Kendimize özel sabit bir telsiz kanalı açıyoruz
    const peer = new Peer('cipil-sikayet-havuzu-ozel');
    const listDiv = document.getElementById('list');

    peer.on('open', (id) => {
        document.getElementById('srvStatus').innerText = "🟢 Canlı hat aktif. Şikayetler bekleniyor...";
    });

    // Diğer telefondan veri geldiği an burası tetiklenir
    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            
            // Yeni gelen şikayet kartını oluştur
            let card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="header">
                    <span class="user-name">👤 ${data.name}</span>
                    <span class="cate">${data.category}</span>
                    <span>🕒 ${data.time}</span>
                </div>
                <div class="text">${data.text}</div>
            `;

            if (data.image) {
                card.innerHTML += `<img src="${data.image}" class="preview">`;
            }

            // En üste ekle
            listDiv.insertBefore(card, listDiv.firstChild);
        });
    });
</script>
</body>
</html>
